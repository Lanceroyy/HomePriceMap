name: Daily home price data refresh

on:
  schedule:
    # Runs once a day at 13:00 UTC (~6am Pacific / 9am Eastern).
    # Zillow only republishes ZHVI around the 16th of each month, so most
    # days this just re-confirms the numbers haven't changed -- cheap and
    # keeps the "last updated" timestamp honest.
    - cron: "0 13 * * *"
  workflow_dispatch: {}  # lets you trigger a manual refresh from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch latest Zillow ZHVI data
        run: python scripts/fetch_data.py

      - name: Generate SEO county pages, sitemap, robots.txt
        run: python scripts/seo_pages_builder.py

      - name: Generate state listicle pages
        run: python scripts/state_pages_builder.py

      - name: Commit updated data and pages if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Sync with any commits made since this job checked out (e.g. a
          # human push in the few minutes this job took to run), so we never
          # end up needing a force-push to get our changes in. --autostash
          # temporarily shelves the just-generated data files so the pull
          # can apply cleanly, then restores them.
          git pull --rebase --autostash origin main
          git add data/county_prices.json data/city_prices.json data/history/ counties/ states/ states.html sitemap.xml robots.txt
          if ! git diff --cached --quiet; then
            git commit -m "chore: daily home price data + SEO page refresh"
            git push
          else
            echo "No data changes today."
          fi
